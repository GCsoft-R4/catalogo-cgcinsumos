volumes:
  ollama_data:

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build: ./backend
    container_name: catalogoweb_backend
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      OLLAMA_URL: http://ollama:11434
